# Custom domain (e.g. weather.leelabs756.com) is served at the site root — build with base href "/".
# To publish for https://<user>.github.io/<repo>/ instead, set repo variable ANGULAR_BASE_HREF to /repo-name/
# (Settings → Secrets and variables → Actions → Variables).
# Repo Settings → Pages → Source: GitHub Actions
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build (base href for custom domain or github.io)
        run: |
          BASE="${{ vars.ANGULAR_BASE_HREF }}"
          if [ -z "$BASE" ]; then BASE="/"; fi
          npx ng build --configuration production --base-href "$BASE"

      # GitHub Pages serves 404.html for unknown paths; copy index so client bundles still load on refresh/deep links.
      - name: SPA fallback (404.html)
        run: cp dist/weath-win-ang/browser/index.html dist/weath-win-ang/browser/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/weath-win-ang/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
