<div class="weather-page">
  <app-current-weather [lat]="lat()" [lon]="lon()" />

  <section class="weather-house" aria-labelledby="weather-house-heading">
    <div class="weather-house__roof" aria-hidden="true"></div>
    <div class="weather-house__upper-trim" aria-hidden="true"></div>

    <div class="weather-house__facade">
      <h2 id="weather-house-heading" class="weather-house__title h6 text-uppercase mb-2 mb-md-3">
        Through the windows
      </h2>
      <p class="weather-house__subtitle small text-body-secondary mb-3 mb-md-4">
        Seven-day outlook framed like panes on the house.
      </p>
      <app-weekly-forecast [lat]="lat()" [lon]="lon()" variant="house" />
    </div>

    <div class="weather-house__foundation" aria-hidden="true"></div>
  </section>

  @if (lastUpdatedAt(); as updated) {
    <p class="small text-body-secondary text-center mt-3 mb-0 weather-page__updated" aria-live="polite">
      Last updated {{ updated | date: 'medium' }}
    </p>
  }
</div>
